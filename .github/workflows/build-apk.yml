name: Build Android APK from ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check project ZIP
        run: |
          ls -la
          test -f project.zip

      - name: Unzip project
        run: |
          rm -rf extracted
          mkdir extracted
          unzip project.zip -d extracted
          echo "Project files:"
          find extracted -maxdepth 4 -type f | head -100

      - name: Find Android project
        run: |
          PROJECT_DIR=$(dirname "$(find extracted -name settings.gradle | head -n 1)")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Found project at: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          ../../gradle-8.7/bin/gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NewLife-CasualPremium-debug-apk
          path: extracted/**/app/build/outputs/apk/debug/*.apk
